name: SWA Deploy

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate sitemap
        run: npm run generate:sitemap

      - name: Create .env file
        run: |
          echo 'VITE_API_URL=/api' > .env
          echo 'VITE_MICROSOFT_CLIENT_ID=d132de4b-ccd8-4e30-8c7c-85485197f855' >> .env
          echo 'VITE_LOCALES_CDN=https://htstorageprod.blob.core.windows.net/locales' >> .env
          echo 'VITE_APP_TITLE=Horizon Tech' >> .env
          echo 'VITE_FEATURE_CASE_STUDIES=false' >> .env
          echo 'VITE_FEATURE_TECHNICAL_RESOURCES=false' >> .env
          echo 'VITE_FEATURE_CHAT=true' >> .env
          echo 'VITE_FEATURE_INNOVATION_LAB=false' >> .env

      - name: Build project
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "dist"
          api_location: "api"
          output_location: ""
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
